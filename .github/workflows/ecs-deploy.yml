on: deployment

name: Deploy to Amazon ECS

permissions:
  id-token: write
  contents: read

jobs:
  determine-env:
    runs-on: ubuntu-latest
    outputs:
      target-env: ${{ steps.set-env.outputs.environment }}
    steps:
      - name: Set Environment
        id: set-env
        run: |
          cat $GITHUB_EVENT_PATH
          echo "parsing deployment info"
          EVENT_INFO="$(cat ${GITHUB_EVENT_PATH})"
          ORIGINAL_ENVIRONMENT="$(jq -r .deployment.original_environment <<< ${EVENT_INFO})"
          ENVIRONMENT="$(jq -r .deployment.environment <<< ${EVENT_INFO})"

          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
          echo "original_environment=$ORIGINAL_ENVIRONMENT" >> $GITHUB_OUTPUT

      - name: Notify QA for production
        if: ${{ steps.set-env.outputs.environment == 'production' }}
        env:
          DEPLOYMENT_PROJECT_NAME: ${{ secrets.DEPLOYMENT_PROJECT_NAME }}
          DEPLOYMENT_REPO_NAME: ${{ secrets.DEPLOYMENT_REPO_NAME }}
        run: |
          curl \
            -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: token $TOKEN" \
            -d '{"projectName":"'"${DEPLOYMENT_PROJECT_NAME}"'", "repoName":"'"${DEPLOYMENT_REPO_NAME}"'", "approveDeployment": true }'\
            https://esa-n8n-us-east-1-production.dcsdevelopment.me/webhook/trigger-qa-regression-notifications

  waitForQA:
    runs-on: ubuntu-latest
    needs: determine-env
    environment: ${{ needs.determine-env.outputs.target-env }}
    steps:
      - name: Proceed
        run: echo "Deploying"

  # ── Step 1: Deploy backend (runs Prisma migrations + seed on startup) ──
  deploy-backend:
    name: "Deploy Backend (migrate → seed → server)"
    runs-on: ubuntu-latest
    needs: waitForQA
    outputs:
      target-env: ${{ steps.deploy-info.outputs.environment }}
      deployment-id: ${{ steps.deploy-info.outputs.id }}
      ref: ${{ steps.deploy-info.outputs.ref }}
      sha: ${{ steps.deploy-info.outputs.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get deploy info
        id: deploy-info
        run: |
          cat $GITHUB_EVENT_PATH
          echo "parsing deployment info"
          EVENT_INFO="$(cat ${GITHUB_EVENT_PATH})"
          ENVIRONMENT="$(jq -r .deployment.environment <<< ${EVENT_INFO})"
          DEPLOYMENT_ID="$(jq -r .deployment.id <<< ${EVENT_INFO})"
          SHA="$(jq -r .deployment.sha <<< ${EVENT_INFO})"
          REF="$(jq -r .deployment.ref <<< ${EVENT_INFO})"

          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
          echo "id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "ref=$REF" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::303874925678:role/pisurveying-deploy-us-east-1-${{ steps.deploy-info.outputs.environment }}
          role-session-name: github-actions-${{ github.run_id }}-${{ github.run_number }}
          role-skip-session-tagging: true
          role-duration-seconds: 3600
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update deployment status — in progress
        env:
          DEPLOYMENT_ID: ${{ steps.deploy-info.outputs.id }}
          TOKEN: ${{ github.token }}
        run: |
          curl \
            -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Accept: application/vnd.github.flash-preview+json" \
            -H "Authorization: token $TOKEN" \
            https://api.github.com/repos/$GITHUB_REPOSITORY/deployments/$DEPLOYMENT_ID/statuses \
            -d '{"state":"in_progress"}'

      - name: Backend — prepare ECS task definition
        id: task-def-backend
        env:
          NEW_IMAGE: ${{ steps.login-ecr.outputs.registry }}/pisurveying/pisurveying-backend:${{ steps.deploy-info.outputs.ref }}-${{ steps.deploy-info.outputs.sha }}
          TASK_FAMILY: pisurveying-backend-${{ steps.deploy-info.outputs.environment }}
          REGION: us-east-1
        run: |
          TASK_DEFINITION=$(aws ecs describe-task-definition --task-definition "$TASK_FAMILY" --region "$REGION")
          NEW_TASK_DEFINITION=$(echo $TASK_DEFINITION | jq --arg IMAGE "$NEW_IMAGE" '.taskDefinition | .containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn) | del(.revision) | del(.status) | del(.requiresAttributes) | del(.compatibilities)')
          TASKDEF_FILENAME="${GITHUB_RUN_ID}-backend.json"
          echo $NEW_TASK_DEFINITION > $TASKDEF_FILENAME
          echo "task-definition=$TASKDEF_FILENAME" >> $GITHUB_OUTPUT

      - name: Backend — deploy ECS service (entrypoint runs migrate → seed → server)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def-backend.outputs.task-definition }}
          service: pisurveying-backend-${{ steps.deploy-info.outputs.environment }}
          cluster: ${{ steps.deploy-info.outputs.environment }}-default
          wait-for-service-stability: true

  # ── Step 2: Deploy worker (only after backend is stable = migrations complete) ──
  deploy-worker:
    name: "Deploy Worker (after migrations complete)"
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get deploy info
        id: deploy-info
        run: |
          EVENT_INFO="$(cat ${GITHUB_EVENT_PATH})"
          ENVIRONMENT="$(jq -r .deployment.environment <<< ${EVENT_INFO})"
          SHA="$(jq -r .deployment.sha <<< ${EVENT_INFO})"
          REF="$(jq -r .deployment.ref <<< ${EVENT_INFO})"

          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "ref=$REF" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::303874925678:role/pisurveying-deploy-us-east-1-${{ steps.deploy-info.outputs.environment }}
          role-session-name: github-actions-${{ github.run_id }}-${{ github.run_number }}
          role-skip-session-tagging: true
          role-duration-seconds: 3600
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Worker — prepare ECS task definition
        id: task-def-worker
        env:
          NEW_IMAGE: ${{ steps.login-ecr.outputs.registry }}/pisurveying/pisurveying-backend:${{ steps.deploy-info.outputs.ref }}-${{ steps.deploy-info.outputs.sha }}
          TASK_FAMILY: pisurveying-worker-${{ steps.deploy-info.outputs.environment }}
          REGION: us-east-1
        run: |
          TASK_DEFINITION=$(aws ecs describe-task-definition --task-definition "$TASK_FAMILY" --region "$REGION")
          NEW_TASK_DEFINITION=$(echo $TASK_DEFINITION | jq --arg IMAGE "$NEW_IMAGE" '.taskDefinition | .containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn) | del(.revision) | del(.status) | del(.requiresAttributes) | del(.compatibilities)')
          TASKDEF_FILENAME="${GITHUB_RUN_ID}-worker.json"
          echo $NEW_TASK_DEFINITION > $TASKDEF_FILENAME
          echo "task-definition=$TASKDEF_FILENAME" >> $GITHUB_OUTPUT

      - name: Worker — deploy ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def-worker.outputs.task-definition }}
          service: pisurveying-worker-${{ steps.deploy-info.outputs.environment }}
          cluster: ${{ steps.deploy-info.outputs.environment }}-default
          wait-for-service-stability: true

  # ── Step 3: Finalize — tag image + update deployment status ──
  finalize:
    name: Finalize Deployment
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-worker]
    if: always()

    steps:
      - name: Get deploy info
        id: deploy-info
        run: |
          EVENT_INFO="$(cat ${GITHUB_EVENT_PATH})"
          ENVIRONMENT="$(jq -r .deployment.environment <<< ${EVENT_INFO})"
          DEPLOYMENT_ID="$(jq -r .deployment.id <<< ${EVENT_INFO})"
          SHA="$(jq -r .deployment.sha <<< ${EVENT_INFO})"
          REF="$(jq -r .deployment.ref <<< ${EVENT_INFO})"

          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
          echo "id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "ref=$REF" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        if: ${{ needs.deploy-backend.result == 'success' && needs.deploy-worker.result == 'success' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::303874925678:role/pisurveying-deploy-us-east-1-${{ steps.deploy-info.outputs.environment }}
          role-session-name: github-actions-${{ github.run_id }}-${{ github.run_number }}
          role-skip-session-tagging: true
          role-duration-seconds: 3600
          aws-region: us-east-1

      - name: Login to Amazon ECR
        if: ${{ needs.deploy-backend.result == 'success' && needs.deploy-worker.result == 'success' }}
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag image for environment
        if: ${{ needs.deploy-backend.result == 'success' && needs.deploy-worker.result == 'success' }}
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: pisurveying/pisurveying-backend
          UPSTREAM_TAG: ${{ steps.deploy-info.outputs.ref }}-${{ steps.deploy-info.outputs.sha }}
          TAG: ${{ steps.deploy-info.outputs.environment }}
        run: |
          docker pull $ECR_REGISTRY/$ECR_REPOSITORY:$UPSTREAM_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$UPSTREAM_TAG $ECR_REGISTRY/$ECR_REPOSITORY:$TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$TAG

      - name: Update deployment status — success
        if: ${{ needs.deploy-backend.result == 'success' && needs.deploy-worker.result == 'success' }}
        env:
          DEPLOYMENT_ID: ${{ steps.deploy-info.outputs.id }}
          TOKEN: ${{ github.token }}
        run: |
          curl \
            -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token $TOKEN" \
            https://api.github.com/repos/$GITHUB_REPOSITORY/deployments/$DEPLOYMENT_ID/statuses \
            -d '{"state":"success"}'

      - name: Update deployment status — failure
        if: ${{ needs.deploy-backend.result == 'failure' || needs.deploy-worker.result == 'failure' }}
        env:
          DEPLOYMENT_ID: ${{ steps.deploy-info.outputs.id }}
          TOKEN: ${{ github.token }}
        run: |
          curl \
            -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token $TOKEN" \
            https://api.github.com/repos/$GITHUB_REPOSITORY/deployments/$DEPLOYMENT_ID/statuses \
            -d '{"state":"failure"}'

  notifyQA:
    runs-on: ubuntu-latest
    needs: [deploy-backend, finalize]
    if: ${{ needs.deploy-backend.outputs.target-env == 'production' && needs.finalize.result == 'success' }}
    steps:
      - name: Notify QA for regression testing
        env:
          DEPLOYMENT_PROJECT_NAME: ${{ secrets.DEPLOYMENT_PROJECT_NAME }}
          DEPLOYMENT_REPO_NAME: ${{ secrets.DEPLOYMENT_REPO_NAME }}
        run: |
          curl \
            -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: token $TOKEN" \
            -d '{"projectName":"'"${DEPLOYMENT_PROJECT_NAME}"'", "repoName":"'"${DEPLOYMENT_REPO_NAME}"'"}'\
            https://esa-n8n-us-east-1-production.dcsdevelopment.me/webhook/trigger-qa-regression-notifications
