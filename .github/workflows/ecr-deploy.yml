on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+

name: Build & Push to Amazon ECR

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: [self-hosted, Linux, x64, intdev, dev]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver: docker

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::303874925678:role/pisurveying-deploy-us-east-1-staging
        role-session-name: github-actions-${{ github.run_id }}-${{ github.run_number }}
        role-skip-session-tagging: true
        role-duration-seconds: 3600
        aws-region: us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Extract metadata
      id: meta
      run: |
        REF="$(basename ${GITHUB_REF})"
        echo "ref=${REF}" >> $GITHUB_OUTPUT
        echo "short-sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

        REGISTRY="${{ steps.login-ecr.outputs.registry }}"
        REPO="pisurveying/pisurveying-backend"

        TAGS="${REGISTRY}/${REPO}:${GITHUB_RUN_ID}"
        TAGS="${TAGS},${REGISTRY}/${REPO}:${GITHUB_RUN_ID}-${REF}-${GITHUB_SHA}"
        TAGS="${TAGS},${REGISTRY}/${REPO}:${REF}-${GITHUB_SHA}"
        TAGS="${TAGS},${REGISTRY}/${REPO}:${REF}"
        TAGS="${TAGS},${REGISTRY}/${REPO}:${GITHUB_SHA}"
        echo "tags=${TAGS}" >> $GITHUB_OUTPUT

    - name: Build and push image to Amazon ECR
      id: build-image
      uses: docker/build-push-action@v5
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: pisurveying/pisurveying-backend
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        platforms: linux/amd64
        provenance: false

    - name: Output image digest
      run: |
        echo "Image digest: ${{ steps.build-image.outputs.digest }}"
        echo "Image tags pushed: ${{ steps.meta.outputs.tags }}"

    - name: Report deployment ready status
      if: success()
      run: |
        echo "ECR deployment completed successfully — image ready for ECS deployment"
